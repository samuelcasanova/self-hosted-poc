services:
  samba:
    image: ghcr.io/servercontainers/samba:latest
    container_name: samba
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      ACCOUNT_media: secretpassword
      UID_media: 1000
      GID_media: 1000
      SAMBA_VOLUME_CONFIG_media: "[Media];path=/shares/media;browseable=yes;read only=no;guest ok=no;valid users=media;force user=media"
    volumes:
      - ./media:/shares/media

  nextcloud-db:
    image: mariadb:11
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloudpassword
    volumes:
      - ./ignored/nextcloud-db:/var/lib/mysql
    networks:
      - nextcloud-net

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloudpassword
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: adminpassword
    volumes:
      - ./ignored/nextcloud-data:/var/www/html
      - ./media:/media
    networks:
      - nextcloud-net
    depends_on:
      - nextcloud-db

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Europe/Madrid
      WEBPASSWORD: password
      PIHOLE_DNS_1: 8.8.8.8
      PIHOLE_DNS_2: 8.8.4.4
      DNSMASQ_LISTENING: all
      DHCP_ACTIVE: "true"
      DHCP_START: 192.168.1.10
      DHCP_END: 192.168.1.150
      DHCP_ROUTER: 192.168.1.1
    volumes:
      - ./ignored/pihole/etc-pihole:/etc/pihole
      - ./ignored/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN

  # Alternative to pihole - start only one at a time
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Europe/Madrid
    volumes:
      - ./ignored/adguardhome/work:/opt/adguardhome/work
      - ./config/adguardhome:/opt/adguardhome/conf
    cap_add:
      - NET_ADMIN

  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    ports:
      - "2283:2283"
    environment:
      DB_HOSTNAME: immich-db
      DB_USERNAME: immich
      DB_PASSWORD: immichpassword
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich-redis
    volumes:
      - ./ignored/immich-data:/usr/src/app/upload
      - ./ignored/immich-library:/usr/src/app/external
      - /etc/localtime:/etc/localtime:ro
    networks:
      - immich-net
    depends_on:
      - immich-db
      - immich-redis
      - immich-machine-learning

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
      - ./ignored/immich-model-cache:/cache
    networks:
      - immich-net

  immich-redis:
    image: redis:6.2-alpine
    container_name: immich-redis
    restart: unless-stopped
    networks:
      - immich-net

  immich-db:
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: immich
      POSTGRES_PASSWORD: immichpassword
      POSTGRES_DB: immich
    volumes:
      - ./ignored/immich-db:/var/lib/postgresql/data
    networks:
      - immich-net

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      HOMEPAGE_ALLOWED_HOSTS: 192.168.1.24:3000
    volumes:
      - ./config/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      TZ: Europe/Madrid
    volumes:
      - ./ignored/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./ignored/uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    environment:
      WG_HOST: samuelcasanova.duckdns.org
      PASSWORD_HASH: ${WIREGUARD_PASSWORD_HASH}
      WG_DEFAULT_DNS: 192.168.1.24,1.1.1.1
    volumes:
      - ./ignored/wg-easy:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./ignored/npm/data:/data
      - ./ignored/npm/letsencrypt:/etc/letsencrypt

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: ${VAULTWARDEN_DOMAIN}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
      WEBSOCKET_ENABLED: "true"
      SIGNUPS_ALLOWED: "false"
    volumes:
      - ./ignored/vaultwarden:/data

  restic-backup:
    image: restic/restic:latest
    container_name: restic-backup
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/scripts/entrypoint.sh"]
    environment:
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      B2_ACCOUNT_ID: ${B2_ACCOUNT_ID}
      B2_ACCOUNT_KEY: ${B2_ACCOUNT_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
    volumes:
      - ./config:/data/config:ro
      - ./media:/data/media:ro
      - ./scripts:/scripts:ro
      - restic-cache:/root/.cache/restic

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - frigate-net

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    restart: unless-stopped
    privileged: true
    shm_size: "256mb"
    devices:
      - /dev/video0:/dev/video0
    ports:
      - "5000:5000"
      - "8554:8554"
    volumes:
      - ./config/frigate/config.yml:/config/config.yml:ro
      - ./ignored/frigate:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    networks:
      - frigate-net
    depends_on:
      - mosquitto

  frigate-notifier:
    image: node:18-alpine
    container_name: frigate-notifier
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install --omit=dev --prefer-offline && node index.js"
    environment:
      MQTT_HOST: mosquitto
      FRIGATE_URL: http://frigate:5000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      ALARM_ACTIVE: ${ALARM_ACTIVE:-false}
      COOLDOWN_SECONDS: ${COOLDOWN_SECONDS:-60}
      TRACKED_LABELS: ${TRACKED_LABELS:-person}
    volumes:
      - ./services/frigate-notifier:/app
      - frigate-notifier-modules:/app/node_modules
    networks:
      - frigate-net
    depends_on:
      - mosquitto
      - frigate

volumes:
  restic-cache:
  frigate-notifier-modules:

networks:
  nextcloud-net:
  immich-net:
  frigate-net:
